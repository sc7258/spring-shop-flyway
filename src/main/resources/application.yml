management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

keycloak:
  realm: intellian-app
  client-id: intellian-app-spring-client
  client-secret: ${KEYCLOAK_CLIENT_SECRET:test-secret}

swagger:
  oauth:
    client-id: ${SWAGGER_OAUTH_CLIENT_ID:intellian-app-angular-client}

spring:
  application:
    name: spring-shop-flyway
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}
          jwk-set-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

springdoc:
  swagger-ui:
    url: /api/v1/openapi.yaml
    path: /api/v1/swagger-ui.html
    disable-swagger-default-url: true
    oauth:
      client-id: ${swagger.oauth.client-id}
      use-pkce-with-authorization-code-grant: true
      scopes: openid,profile,email
